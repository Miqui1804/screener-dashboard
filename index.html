<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Screeners · Acciones US</title>
<style>
  :root {
    --navy: #232F3E;
    --orange: #FF9900;
    --light: #F7F7F7;
    --green: #1F8E3D;
    --blue: #1F6FB5;
    --purple: #7A4FB7;
    --red: #C0392B;
    --muted: #6B7280;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--light); color: var(--navy); }

  /* HEADER */
  .header {
    background: var(--navy);
    border-left: 14px solid var(--orange);
    padding: 32px 40px 28px;
  }
  .header h1 {
    font-family: Georgia, serif;
    font-size: 38px;
    color: var(--white);
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-style: italic;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-bottom: 18px;
  }
  .header .subtitle a { color: var(--orange); text-decoration: none; }

  .screener-select {
    margin-bottom: 18px;
  }
  .screener-select select {
    font-size: 18px;
    font-weight: 700;
    padding: 10px 16px;
    border-radius: 8px;
    border: 2px solid var(--orange);
    background: var(--navy);
    color: var(--white);
    cursor: pointer;
    outline: none;
    max-width: 100%;
  }
  .screener-select select option { background: var(--navy); color: var(--white); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .chip {
    border: 1.5px solid var(--orange);
    color: rgba(255,255,255,0.9);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    white-space: nowrap;
  }
  .chip-warn {
    border-color: var(--red);
    color: rgba(255,255,255,0.85);
    background: rgba(192,57,43,0.25);
  }
  .note {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
    max-width: 760px;
  }
  .counter { color: var(--orange); font-size: 32px; font-weight: 700; }
  .counter-label { font-size: 16px; color: rgba(255,255,255,0.7); font-weight: 400; margin-left: 8px; }

  /* TOOLBAR */
  .toolbar {
    background: var(--white);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .toolbar input {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    width: 230px;
    outline: none;
    transition: border-color 0.2s;
  }
  .toolbar input:focus { border-color: var(--orange); }
  .toolbar select {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    background: var(--white);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .toolbar select:focus { border-color: var(--orange); }
  .showing { font-size: 13px; color: var(--muted); margin-left: auto; }

  /* GRID */
  .grid-container { padding: 24px 40px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--white);
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); transform: translateY(-2px); }

  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .logo-box {
    background: var(--navy);
    width: 48px; height: 48px;
    border-radius: 8px;
    padding: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-box img { width: 40px; height: 40px; object-fit: contain; }
  .logo-fallback {
    color: var(--white);
    font-size: 9px;
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    word-break: break-all;
  }

  .card-info { flex: 1; min-width: 0; }
  .ticker-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
  .ticker { font-size: 19px; font-weight: 700; color: var(--navy); }
  .ticker:hover { text-decoration: underline; color: var(--blue); }
  .dist-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    background: rgba(0,0,0,0.05);
  }
  .dist-green { color: var(--green); }
  .dist-orange { color: var(--orange); }
  .dist-red { color: var(--red); }

  .company-name {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .price-row {
    background: var(--light);
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 4px;
  }
  .price { font-size: 18px; font-weight: 700; color: var(--navy); }
  .mktcap { font-size: 12px; color: var(--muted); font-weight: 500; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat { padding: 6px 8px; border-left: 3px solid; }
  .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
  .stat-value { font-size: 13px; font-weight: 700; }
  .stat-green { border-color: var(--green); }
  .stat-green .stat-value { color: var(--green); }
  .stat-purple { border-color: var(--purple); }
  .stat-purple .stat-value { color: var(--purple); }
  .stat-blue { border-color: var(--blue); }
  .stat-blue .stat-value { color: var(--blue); }
  .stat-orange { border-color: var(--orange); }
  .stat-orange .stat-value { color: var(--orange); }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 16px;
  }

  /* FOOTER */
  footer {
    border-top: 3px solid var(--orange);
    background: var(--white);
    padding: 20px 40px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--orange); text-decoration: none; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--navy);
    border-radius: 10px;
    width: 100%;
    max-width: 1000px;
    height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 2px solid var(--orange);
  }
  .modal-header h2 { color: var(--white); font-size: 20px; font-family: Georgia, serif; }
  .modal-close {
    background: none;
    border: none;
    color: var(--white);
    font-size: 26px;
    cursor: pointer;
    line-height: 1;
    padding: 0 6px;
  }
  .modal-close:hover { color: var(--orange); }
  .modal-chart-container { flex: 1; }
  #tv_chart_container { width: 100%; height: 100%; }

  @media (max-width: 600px) {
    .header { padding: 24px 20px 20px; }
    .header h1 { font-size: 26px; }
    .toolbar { padding: 12px 16px; }
    .toolbar input { width: 100%; }
    .grid-container { padding: 16px; }
    .showing { margin-left: 0; }
    .modal-box { height: 90vh; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Dashboard de Screeners · Acciones US</h1>
  <p class="subtitle">Datos del <span id="fecha"></span> · vía <a href="https://stockanalysis.com/stocks/screener/" target="_blank">stockanalysis.com</a> · haz clic en un ticker para ver su gráfico</p>

  <div class="screener-select">
    <select id="screenerSelect" onchange="switchScreener()">
      <option value="crecimiento">Crecimiento · 7 filtros de calidad/crecimiento</option>
      <option value="victor">Acciones Top · Crecimiento + Calidad (10 filtros)</option>
      <option value="oneill">Oneill · Momentum + Calidad (6 filtros)</option>
      <option value="banderas" selected>Banderas · Patrón Mástil + Bandera (técnico)</option>
      <option value="rsc">RSC Mansfield · Top 15 vs S&amp;P 500 (1 año)</option>
      <option value="rsc2">RSC Mansfield · Top 15 S&amp;P 500 + Nasdaq 100</option>
      <option value="coincidencias">Coincidencias · En 3+ screeners</option>
    </select>
  </div>

  <div class="chips" id="chipsArea"></div>
  <p class="note" id="noteArea"></p>
  <div>
    <span class="counter" id="matchCount">0</span>
    <span class="counter-label" id="counterLabel">valores cumplen los filtros aplicados</span>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍  Buscar ticker o nombre…" oninput="applyFilters()">
  <select id="sortSelect" onchange="applyFilters()"></select>
  <span class="showing" id="showingText"></span>
</div>

<div class="grid-container">
  <div class="grid" id="stockGrid"></div>
</div>

<footer>
  <span id="footerDate"></span> &nbsp;·&nbsp; Fuente de datos: <a href="https://stockanalysis.com" target="_blank">stockanalysis.com</a> (sesión navegador) · Banderas: histórico diario completo vía API interna de stockanalysis.com
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">TICKER</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-chart-container">
      <div id="tv_chart_container"></div>
    </div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

/* ============ HELPERS ============ */
function parseMktCap(s) {
  if (typeof s === 'number') return s;
  const m = String(s).match(/([\d,.]+)([BTM])/);
  if (!m) return 0;
  const n = parseFloat(m[1].replace(/,/g,''));
  return m[2]==='T'?n*1e12:m[2]==='B'?n*1e9:n*1e6;
}
function fmtMktCap(n) {
  n = parseMktCap(n);
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  return n.toString();
}
function parsePct(s) { return parseFloat(String(s).replace(/[%,]/g,''))||0; }
function parseVol(s) { return parseInt(String(s).replace(/,/g,''))||0; }
function parseNum(s) { return parseFloat(String(s).replace(/,/g,''))||0; }
function fmtPct(val) {
  const abs = Math.abs(val);
  if (abs >= 1000) return (val/1000).toFixed(1)+'k%';
  return val.toFixed(2)+'%';
}
function fmtVol(s) {
  const v = parseVol(s);
  if (v>=1e6) return (v/1e6).toFixed(1)+'M';
  if (v>=1e3) return Math.round(v/1e3)+'K';
  return v.toString();
}
function distClass(pct, greenT, orangeT) {
  if (pct > greenT) return 'dist-green';
  if (pct > orangeT) return 'dist-orange';
  return 'dist-red';
}
function escapeHtml(s) { return String(s).replace(/"/g,'&quot;'); }
function logoBox(ticker) {
  return `<div class="logo-box">
        <img src="https://financialmodelingprep.com/image-stock/${ticker}.png"
             onerror="this.style.display='none';this.parentNode.innerHTML='<div class=&quot;logo-fallback&quot;>${ticker}</div>'"
             alt="${ticker}">
      </div>`;
}
function tickerSpan(ticker) {
  return `<span class="ticker" onclick="event.stopPropagation();openChart('${ticker}')">${ticker}</span>`;
}

/* ============ STATE / RENDERING ============ */
let currentKey = 'banderas';

function buildSortSelect(cfg) {
  const sel = document.getElementById('sortSelect');
  sel.innerHTML = cfg.sortOptions.map(o => `<option value="${o[0]}">${o[1]}</option>`).join('');
}

function buildChips(cfg) {
  const area = document.getElementById('chipsArea');
  let html = cfg.chips.map(c => `<span class="chip">${c}</span>`).join('');
  if (cfg.chipWarn) html += `<span class="chip chip-warn">${cfg.chipWarn}</span>`;
  area.innerHTML = html;
  document.getElementById('noteArea').innerHTML = cfg.note || '';
  document.getElementById('noteArea').style.display = cfg.note ? 'block' : 'none';
  document.getElementById('counterLabel').textContent = cfg.counterLabel;
}

function applyFilters() {
  const cfg = SCREENERS[currentKey];
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;
  let filtered = cfg.data.filter(d =>
    !q || d[0].toLowerCase().includes(q) || d[1].toLowerCase().includes(q)
  );
  filtered.sort((a,b) => cfg.sortFn(a,b,sort));
  const grid = document.getElementById('stockGrid');
  grid.innerHTML = filtered.length
    ? filtered.map(cfg.renderCard).join('')
    : '<div class="no-results">No hay resultados para tu búsqueda.</div>';
  document.getElementById('showingText').textContent = `Mostrando ${filtered.length} de ${cfg.data.length}`;
  document.getElementById('matchCount').textContent = filtered.length;
}

function switchScreener() {
  currentKey = document.getElementById('screenerSelect').value;
  const cfg = SCREENERS[currentKey];
  document.getElementById('searchInput').value = '';
  buildChips(cfg);
  buildSortSelect(cfg);
  applyFilters();
}

/* ============ TRADINGVIEW MODAL ============ */
let tvWidget = null;
function openChart(ticker) {
  document.getElementById('modalTitle').textContent = ticker;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('tv_chart_container').innerHTML = '';
  tvWidget = new TradingView.widget({
    container_id: 'tv_chart_container',
    symbol: ticker,
    autosize: true,
    interval: 'D',
    timezone: 'Etc/UTC',
    theme: 'dark',
    style: '1',
    locale: 'es',
    toolbar_bg: '#232F3E',
    enable_publishing: false,
    allow_symbol_change: true,
    hide_side_toolbar: false,
    studies: [
      { id: "MAExp@tv-basicstudies", inputs: { length: 10 }, overrides: { "Plot.color": "#FFD700", "Plot.linestyle": 2, "Plot.linewidth": 1 } },
      { id: "MAExp@tv-basicstudies", inputs: { length: 21 }, overrides: { "Plot.color": "#FF4DA6", "Plot.linewidth": 1 } },
      { id: "MASimple@tv-basicstudies", inputs: { length: 50 }, overrides: { "Plot.color": "#00BFFF", "Plot.linewidth": 2 } }
    ]
  });
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('tv_chart_container').innerHTML = '';
}
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeModal();
});

/* ============ INIT ============ */
const hoy = new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
document.getElementById('fecha').textContent = hoy;
document.getElementById('footerDate').textContent = hoy;
buildChips(SCREENERS[currentKey]);
buildSortSelect(SCREENERS[currentKey]);
applyFilters();
</script>
